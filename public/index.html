<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Student Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Student Management System</h2>

<div class="card shadow p-4">

<h4>Add / Edit Student</h4>

<form id="studentForm" class="row g-3">

<div class="col-md-6">
<input type="text" id="name" class="form-control" placeholder="Student Name" required>
</div>

<div class="col-md-6">
<input type="email" id="email" class="form-control" placeholder="Email" required>
</div>

<div class="col-md-6">
<input type="text" id="phone" class="form-control" placeholder="Phone">
</div>

<div class="col-md-6">
<input type="text" id="course" class="form-control" placeholder="Course">
</div>

<div class="col-12">
<button class="btn btn-primary">Save Student</button>
</div>

</form>

</div>

<div class="card shadow mt-4 p-4">

<h4>Student List</h4>

<input
type="text"
id="searchInput"
class="form-control mb-3"
placeholder="Search student..."
onkeyup="searchStudent()">

<table class="table table-striped">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Course</th>
<th>Action</th>
</tr>

</thead>

<tbody id="studentTable"></tbody>

</table>

</div>

</div>

<script>

let editId = null;

// Load students
async function loadStudents(){

const res = await fetch("/students");
const students = await res.json();

const table = document.getElementById("studentTable");

table.innerHTML = "";

students.forEach(student => {

table.innerHTML += `
<tr>

<td>${student.id}</td>
<td>${student.name}</td>
<td>${student.email}</td>
<td>${student.phone}</td>
<td>${student.course}</td>

<td>

<button class="btn btn-warning btn-sm"
onclick="editStudent(${student.id},'${student.name}','${student.email}','${student.phone}','${student.course}')">

Edit

</button>

<button class="btn btn-danger btn-sm"
onclick="deleteStudent(${student.id})">

Delete

</button>

</td>

</tr>
`;

});

}

// Form submit
document.getElementById("studentForm").addEventListener("submit", async function(e){

e.preventDefault();

const data = {

name: document.getElementById("name").value,
email: document.getElementById("email").value,
phone: document.getElementById("phone").value,
course: document.getElementById("course").value

};

if(editId){

await fetch("/students/" + editId,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

editId = null;

}else{

await fetch("/students",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

}

this.reset();
loadStudents();

});

// Edit student
function editStudent(id,name,email,phone,course){

editId = id;

document.getElementById("name").value = name;
document.getElementById("email").value = email;
document.getElementById("phone").value = phone;
document.getElementById("course").value = course;

}

// Delete student
async function deleteStudent(id){

if(confirm("Delete this student?")){

await fetch("/students/" + id,{
method:"DELETE"
});

loadStudents();

}

}

// Search student
function searchStudent(){

const input = document.getElementById("searchInput").value.toLowerCase();

const rows = document.querySelectorAll("#studentTable tr");

rows.forEach(row => {

const text = row.innerText.toLowerCase();

if(text.includes(input)){
row.style.display = "";
}else{
row.style.display = "none";
}

});

}

loadStudents();

</script>

</body>
</html>
